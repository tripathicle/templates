parameters:
  workingDir: ''

jobs:
- job: terraformvalidate
  displayName: Terraform Validate
  steps:
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: ${{ parameters.workingDir }}

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: ${{ parameters.workingDir }}